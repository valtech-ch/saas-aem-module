version: 2
updates:
  # Maven dependencies (parent + all modules)
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "java"
    # Stay on the current major lines: AEM / Adobe platform pins us to older
    # major versions, so never propose major-version bumps automatically.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      maven-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/ui.frontend"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    # Major front-end bumps (e.g. TypeScript 6, style-loader 4) break the AEM
    # clientlib build, so restrict automated updates to minor/patch only.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      npm-dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      npm-prod-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    labels:
      - "dependencies"
      - "github-actions"
    # Pin to current action majors; review major action upgrades manually.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
